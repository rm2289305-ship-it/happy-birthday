<!DOCTYPE html>
<html>
<head>
<title>Happy Birthday ❤️</title>
<style>
body{
  margin:0;
  background:linear-gradient(135deg,#ff758c,#ff7eb3);
  font-family:Arial,sans-serif;
  color:white;
  text-align:center;
}
.container{
  padding:40px 20px;
}
img{
  width:250px;
  border-radius:20px;
  box-shadow:0 10px 25px rgba(0,0,0,.3);
}
button{
  margin-top:20px;
  padding:12px 25px;
  border:none;
  border-radius:30px;
  background:white;
  color:#ff4081;
  font-size:18px;
  cursor:pointer;
}
#letter{
  display:none;
  margin-top:30px;
  font-size:20px;
}
</style>
</head>
<body>

<div class="container">
<h1>🎉 Happy Birthday! 🎂</h1>

<img src="photo.jpg">

<br>

<button onclick="showLetter()">💌 Open My Letter</button>

<div id="letter">
<p>
You are one of the most special people in my life. ❤️<br><br>
May this year bring you happiness, success, and lots of smiles.<br><br>
Happy Birthday! 🎂🎁
</p>
</div>

</div>

<script>
function showLetter(){
document.getElementById("letter").style.display="block";
}
</script>

</body>
</html>
