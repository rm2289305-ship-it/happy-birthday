<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Birthday Surprise</title>

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
}

body{
height:100vh;
display:flex;
justify-content:center;
align-items:center;
background:linear-gradient(135deg,#ff6b81,#ff9ff3);
overflow:hidden;
}

.card{
background:rgba(255,255,255,.15);
backdrop-filter:blur(15px);
padding:40px;
border-radius:20px;
text-align:center;
box-shadow:0 8px 30px rgba(0,0,0,.25);
width:90%;
max-width:350px;
color:white;
}

input{
width:100%;
padding:12px;
margin:20px 0;
border:none;
border-radius:10px;
font-size:18px;
}

button{
padding:12px 30px;
border:none;
border-radius:30px;
background:white;
color:#ff4081;
font-size:18px;
cursor:pointer;
transition:.3s;
}

button:hover{
transform:scale(1.05);
}

.heart{
position:absolute;
color:white;
font-size:22px;
animation:float 8s linear infinite;
opacity:.7;
}

@keyframes float{
0%{
transform:translateY(100vh);
}
100%{
transform:translateY(-120vh);
}
}
</style>
</head>

<body>

<div class="card">
<h1>❤️ Secret Surprise ❤️</h1>
<p>Enter the password</p>

<input type="password" id="pass" placeholder="Password">

<button onclick="check()">Unlock</button>

<p id="msg"></p>
</div>

<script>
for(let i=0;i<30;i++){
let h=document.createElement("div");
h.innerHTML="❤";
h.className="heart";
h.style.left=Math.random()*100+"vw";
h.style.animationDuration=(4+Math.random()*6)+"s";
h.style.fontSize=(15+Math.random()*25)+"px";
document.body.appendChild(h);
}

function check(){

if(document.getElementById("pass").value=="2207"){
window.location="home.html";
}
else{
document.getElementById("msg").innerHTML="❌ Wrong Password";
}
}
</script>

</body>
</html>
